services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
      POSTGRES_DB: bookrating
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser -d bookrating"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://bookuser:bookpass@db:5432/bookrating
      JWT_SECRET: super-secret-jwt-key-change-in-production-abc123
      JWT_EXPIRES_IN: 15m
      COOKIE_MAX_AGE: 900000
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./server/src:/app/src
    networks:
      - app-network

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./client/src:/app/src
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
